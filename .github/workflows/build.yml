name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch: # 允许手动触发

jobs:
  # ── 线上环境 Windows ──────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (online)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: List bundle output
        shell: powershell
        run: |
          if (Test-Path "src-tauri/target/release/bundle") {
            Get-ChildItem -Recurse "src-tauri/target/release/bundle" | Select-Object FullName
          } else {
            Write-Host "bundle directory not found"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

  # ── 测试环境 Windows ──────────────────────────────────
  build-windows-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Windows (test)
        # Windows shell 不支持 APP_ENV=xxx 前缀语法，通过 step env 注入编译时变量
        run: npx tauri build --config src-tauri/tauri.test.conf.json
        env:
          APP_ENV: test
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: List bundle output
        shell: powershell
        run: |
          if (Test-Path "src-tauri/target/release/bundle") {
            Get-ChildItem -Recurse "src-tauri/target/release/bundle" | Select-Object FullName
          } else {
            Write-Host "bundle directory not found"
          }

      - name: Upload Windows Test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

  # ── 线上环境 macOS ────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (online)
        run: npm run tauri build

      - name: List bundle output
        run: find src-tauri/target/release/bundle -type f 2>/dev/null || echo "bundle dir not found"

      - name: Zip .app for upload
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -r "aichat-Updater-macOS.zip" *.app

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.zip
          if-no-files-found: error
          retention-days: 30

  # ── 测试环境 macOS ────────────────────────────────────
  build-macos-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (test)
        run: npm run build && npx tauri build --config src-tauri/tauri.test.conf.json
        env:
          APP_ENV: test

      - name: List bundle output
        run: find src-tauri/target/release/bundle -type f 2>/dev/null || echo "bundle dir not found"

      - name: Zip .app for upload
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -r "aichat-Updater-Test-macOS.zip" *.app

      - name: Upload macOS Test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-build
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.zip
          if-no-files-found: error
          retention-days: 30

